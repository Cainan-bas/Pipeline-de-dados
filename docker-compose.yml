services:
  db:
    image: postgres:17
    
    environment:

      - POSTGRES_DB=PESQUISADOR
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:    
      - "5434:5432"

volumes:
  postgres_data: